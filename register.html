<!DOCTYPE html>
<html lang="en">
<head>




    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register page- primehaven</title>

<link rel="stylesheet" href="CSS/register.css">





</head>
<body>

<form action="">

<legend>Join us and start your journey today!</legend> <br>

<label for="fname">First Name;</label>

<input type="text"  placeholder="enter first name" id="fname" required> <br><br>


<label for="sname">surname;</label>

<input type="text"  placeholder="enter first name" id="sname" required> <br><br>

<label for="email">Email Address;</label>

<input type="email"  placeholder="abc@gmail.com" id="email" required> <br><br>


<label for="pwd">password;</label>

<input type="password"  placeholder="type password" id="pwd" required> <br><br>


<label for="phone">Your phone number;</label>

<input type="tel"  placeholder=" 0711912258" required> <br><br>

<label for="yob">year of birth;</label>

<input type="date" id="yob" required> <br><br>

<label for="dt">date and time;</label>

<input type="datetime-local" id="dt" required> <br><br>

<label for="file">upload file;</label>

<input type="file" id="file" required> <br><br>

<label for="Nationality">select Nationality;</label>

<!--dropdown-->
<select name="" id="nationality">

<option value="" disabled>--select one </option>


<option value="">italian</option>
<option value="">french</option>
<option value="">American</option>
<option value="">Kenyan</option>


</select>

<!---end of dropdown--> <br><br>

<label > select gender</label> <br>

<input type="radio" id="male" name="gender">

<label for="male">Male</label> <br>

<input type="radio" id="female" name="gender">

<label for="female">female</label> <br>

<input type="radio" id="other" name="gender">

<label for="other">other</label> <br> <br>

<label >Choose web programing languages</label> <br>

<input type="checkbox" id="php" name="PHP">

<label for="php">PHP</label> <br> <br>

<input type="checkbox" id="python" name="python">

<label for="python">python</label> <br> <br>

<input type="checkbox" id="swift" name="swift">

<label for="swift">swift</label> <br> <br>


<label for="message">Message</label> <br>

<textarea name="" id="" cols="40" rows="5" placeholder="type here"></textarea>
<br><br>

<button > APPLY NOW</button>




</form>









    
</body>
</html>
